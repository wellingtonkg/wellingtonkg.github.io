<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="greenGradient" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#1FBF71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009C3B;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="yellowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE55C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="blueGradient" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#1E5BA8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#002B7F;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Green circle background with gradient -->
  <circle cx="16" cy="16" r="16" fill="url(#greenGradient)" filter="url(#shadow)"/>
  
  <!-- Yellow diamond with gradient -->
  <polygon points="16,3 28,16 16,29 4,16" fill="url(#yellowGradient)"/>
  
  <!-- Blue circle with gradient -->
  <circle cx="16" cy="16" r="7.5" fill="url(#blueGradient)"/>
  
  <!-- Subtle shine effect on blue circle -->
  <ellipse cx="13" cy="13.5" rx="2" ry="1.5" fill="#FFFFFF" opacity="0.2"/>
</svg>